name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/ojasik/mini-platform

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
            docker build -t ${IMAGE}:${{ github.sha }} . 
            docker push ${IMAGE}:${{ github.sha }} 

      - name: Update kubernetes manifests with new image tag
        run: |
            sed -i "s#${IMAGE}:.*#${IMAGE}:${{ github.sha }}#" k8s/deployment-api.yaml

      - name: Commit manifest update
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add k8s/deployment-api.yaml
            git commit -m "Update deployment manifest with ${{ github.sha }} [skip ci]" 
            git push
