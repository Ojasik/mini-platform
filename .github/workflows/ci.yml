name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ojasik/mini-platform

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4


      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}


      - name: Build and push
        run: |
          docker build \
          -t $IMAGE:${{ github.sha }} .

          docker push \
          $IMAGE:${{ github.sha }}


      - name: Update infra repo
        run: |
          git clone https://x-access-token:${{ secrets.INFRA_TOKEN }}@github.com/Ojasik/mini-platform-infra.git

          cd mini-platform-infra

          sed -i "s#${IMAGE}:.*#${IMAGE}:${{ github.sha }}#" k8s/deployment-api.yaml

          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

          git add k8s/deployment-api.yaml

          git commit -m "Update image tag ${{ github.sha }} [skip ci]" || exit 0

          git push