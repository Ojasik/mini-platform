name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ojasik/mini-platform

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4


      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}


      - name: Build and push
        run: |
          docker build \
          -t $IMAGE:${{ github.sha }} .

          docker push \
          $IMAGE:${{ github.sha }}


      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: Ojasik/mini-platform-infra
          token: ${{ secrets.INFRA_TOKEN }}
          path: infra

      - name: Update Helm image tag
        uses: mikefarah/yq@v4.52.2
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          cmd: >
            yq -i
            '.api.image.tag = strenv(IMAGE_TAG)'
            infra/helm/mini-platform/values.yaml

      - name: Commit infrastructure change
        working-directory: infra
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add helm/mini-platform/values.yaml

          if git diff --cached --quiet; then
            echo "Image tag has not changed"
            exit 0
          fi

          git commit \
            -m "Deploy mini-platform ${{ github.sha }}"

          git push origin HEAD:main